<div
  class="flex flex-col items-center justify-center rounded-xl border border-red-100 bg-red-50/70 text-center shadow-sm"
  [ngClass]="{
    'px-8 py-16': size === 'default',
    'px-6 py-12': size === 'sm',
    'px-5 py-10': size === 'xs',
  }"
>
  <div class="mb-4 flex items-center justify-center rounded-full bg-red-100 p-4">
    <svg class="h-8 w-8 text-red-600" fill="currentColor" viewBox="0 0 20 20">
      <path
        fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
        clip-rule="evenodd"
      />
    </svg>
  </div>
  <p class="text-sm font-semibold uppercase tracking-[0.2em] text-red-600">{{ title }}</p>
  <p class="mt-2 max-w-md text-base font-medium text-red-800">{{ error }}</p>

  @if (details) {
    <p class="mt-2 max-w-lg text-sm leading-6 text-red-700/80">{{ details }}</p>
  }

  @if (code) {
    <p class="mt-3 rounded-full bg-white px-3 py-1 text-xs font-semibold uppercase tracking-wide text-red-600">
      Error {{ code }}
    </p>
  }

  @if (retryable) {
    <button
      (click)="refresh.emit()"
      class="mt-5 inline-flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 font-medium text-white transition-colors hover:bg-red-700"
    >
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
        />
      </svg>
      {{ retryLabel }}
    </button>
  }
</div>
