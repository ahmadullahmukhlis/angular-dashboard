<div>
  <p-select
    [options]="options()"
    [optionLabel]="optionLabel"
    [optionValue]="optionValue"
    [showClear]="showClear"
    [checkmark]="showClear"
    [placeholder]="placeholder"
    class="w-full"
    appendTo="body"
    [ngModel]="selected()"
    (ngModelChange)="selected.set($event)"
    (onChange)="onSelectChange($event)"
    [filter]="isSearable"
    [disabled]="disabledState()"
  ></p-select>
</div>
