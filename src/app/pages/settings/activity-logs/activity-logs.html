<div class="page">
  <div class="page-panel">
    <div class="page-header">
      <div>
        <h2 class="title">Activity Logs</h2>
        <p class="subtitle">Inspect user activity, restore logs, and review per-user history.</p>
      </div>
    </div>

    <app-datatable
      [url]="'/user-management/activity-log'"
      [name]="'Activity Logs'"
      [showDetails]="true"
      [tableName]="'settings-activity-logs-table'"
      [config]="activityTableConfig"
    ></app-datatable>
  </div>

  <app-modal
    [visible]="detailModalVisible"
    [title]="'Activity Log Details'"
    [widthClass]="'w-[760px]'"
    (onClose)="closeDetailModal()"
  >
    <pre class="activity-log-json">{{ detailPayload | json }}</pre>
  </app-modal>
</div>
