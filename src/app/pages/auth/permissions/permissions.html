<div class="page">
  <div class="page-header">
    <div>
      <h2 class="title">Permissions</h2>
      <p class="subtitle">Define permission strings and group assignments.</p>
    </div>
    <button class="btn" (click)="openCreate()">New Permission</button>
  </div>

  <app-datatable
    [url]="'/permissions'"
    [name]="'permissions'"
    [tableName]="'permissions-table'"
    [config]="tableConfig"
  ></app-datatable>

  <app-modal
    [visible]="showModal"
    [title]="isEdit ? 'Edit Permission' : 'Create Permission'"
    [widthClass]="'w-[700px]'"
    (onClose)="closeModal()"
  >
    <app-dynamic-form-builder
      [fields]="fields"
      [action]="''"
      [method]="isEdit ? 'PUT' : 'POST'"
      (formSubmitted)="submit($event)"
    ></app-dynamic-form-builder>
  </app-modal>
</div>
