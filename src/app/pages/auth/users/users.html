<div class="page">
  <div class="page-header">
    <div>
      <h2 class="title">Users</h2>
      <p class="subtitle">Users for the current client context.</p>
    </div>
    <button class="btn" (click)="openCreate()">New User</button>
  </div>

  <app-datatable
    [url]="'/users'"
    [name]="'users'"
    [tableName]="'users-table'"
    [config]="userTableConfig"
  ></app-datatable>

  <app-modal
    [visible]="showUserModal"
    [title]="isEdit ? 'Edit User' : 'Create User'"
    [widthClass]="'w-[900px]'"
    (onClose)="closeModal()"
  >
    <app-dynamic-form-builder
      [fields]="userFields"
      [action]="actionUrl"
      [method]="method"
      [hiddenFields]="hiddenFields"
      (submitCompleted)="onSubmit()"
    ></app-dynamic-form-builder>
  </app-modal>
</div>
