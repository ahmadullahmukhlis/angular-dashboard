<div class="page">
  <div class="page-header">
    <div>
      <h2 class="title">Roles</h2>
      <p class="subtitle">Assign permissions and group roles.</p>
    </div>
    <button class="btn" (click)="openCreate()">New Role</button>
  </div>

  <app-datatable
    [url]="'/roles'"
    [name]="'roles'"
    [tableName]="'roles-table'"
    [config]="tableConfig"
  ></app-datatable>

  <app-modal
    [visible]="showModal"
    [title]="isEdit ? 'Edit Role' : 'Create Role'"
    [widthClass]="'w-[700px]'"
    (onClose)="closeModal()"
  >
    <app-dynamic-form-builder
      [fields]="fields"
      [action]="''"
      [method]="isEdit ? 'PUT' : 'POST'"
      (formSubmitted)="submit($event)"
    ></app-dynamic-form-builder>
  </app-modal>
</div>
