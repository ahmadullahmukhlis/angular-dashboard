<div class="page">
  <div class="page-panel">
    <div class="page-header">
      <div>
        <h2 class="title">My Profile</h2>
        <p class="subtitle">Update your profile information and change your password.</p>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 xl:grid-cols-2">
      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="mb-6">
          <h3 class="text-lg font-bold text-slate-900">Profile Information</h3>
          <p class="mt-1 text-sm text-slate-500">Manage your name, email, and profile image.</p>
        </div>

        <app-dynamic-form-builder
          [fields]="profileFields"
          [method]="'PUT'"
          [url]="profileAction"
          [className]="'grid grid-cols-1 md:grid-cols-2 gap-4'"
          [initialValues]="profileInitialValues()"
          [payloadTransform]="transformProfilePayload"
          [submitLabel]="'Save Profile'"
          (submitCompleted)="onProfileSaved($event)"
        ></app-dynamic-form-builder>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="mb-6">
          <h3 class="text-lg font-bold text-slate-900">Change Password</h3>
          <p class="mt-1 text-sm text-slate-500">Use your current password to set a new one.</p>
        </div>

        <app-dynamic-form-builder
          [fields]="passwordFields"
          [method]="'POST'"
          [url]="passwordAction"
          [className]="'grid grid-cols-1 md:grid-cols-2 gap-4'"
          [submitLabel]="'Change Password'"
          (submitCompleted)="onPasswordChanged($event)"
        ></app-dynamic-form-builder>
      </section>
    </div>
  </div>
</div>
